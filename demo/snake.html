<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>htest playground — Checkbox snake</title>
  <link rel="stylesheet" href="assets/app.css">
</head>
<body>
  <header class="nav">
    <span class="brand">htest playground</span>
    <a id="nav-home" href="index.html">Home</a>
    <a id="nav-popup" href="popup.html">Popup</a>
    <a id="nav-spinner" href="spinner.html">Spinner</a>
    <a id="nav-form" href="form.html">Form</a>
    <a id="nav-snake" class="here" href="snake.html">Snake</a>
    <a id="nav-scroll" href="scroll.html">Scroll</a>
  </header>

  <main>
    <h1>Checkbox snake</h1>
    <p class="lead">Check exactly the snake path and you win. Each box is <code>#cb-&lt;row&gt;-&lt;col&gt;</code> (0-based). Tick any wrong box and the win goes away — a clean present/absent target.</p>
    <div class="card">
      <div id="grid" class="grid"></div>
      <div id="slot"></div>
    </div>
  </main>

  <script>
    // The winning snake path (row,col), 0-based.
    var WIN = [[0,0],[0,1],[0,2],[1,2],[2,2],[2,3],[2,4]];
    var winKeys = WIN.map(function (p) { return p[0] + '-' + p[1]; }).sort().join(',');

    var grid = document.getElementById('grid');
    for (var r = 0; r < 5; r++) {
      for (var c = 0; c < 5; c++) {
        var lbl = document.createElement('label');
        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.id = 'cb-' + r + '-' + c;
        cb.addEventListener('change', check);
        lbl.appendChild(cb);
        grid.appendChild(lbl);
      }
    }

    function check() {
      var on = [];
      var boxes = grid.querySelectorAll('input');
      for (var i = 0; i < boxes.length; i++) {
        if (boxes[i].checked) on.push(boxes[i].id.slice(3)); // strip "cb-"
      }
      var key = on.sort().join(',');
      var win = document.getElementById('snake-win');
      if (key === winKeys) {
        if (!win) {
          win = document.createElement('div');
          win.id = 'snake-win';
          win.className = 'win';
          win.textContent = 'You win!';
          document.getElementById('slot').appendChild(win);
        }
      } else if (win) {
        win.remove();
      }
    }
  </script>
</body>
</html>
